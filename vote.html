<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vote</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif; margin: 0; min-height: 100vh;
      background: #111; color: #eee; display: flex; flex-direction: column;
      padding: 1.5rem; gap: 1.25rem;
    }
    h1 { font-size: 1.6rem; line-height: 1.25; margin: 0.5rem 0 0; }
    .options { display: flex; flex-direction: column; gap: 1rem; }
    button.opt {
      font-size: 1.3rem; padding: 1.25rem; border: 2px solid #444; border-radius: 14px;
      background: #1c1c1f; color: #eee; cursor: pointer; transition: transform .05s ease;
    }
    button.opt:active { transform: scale(.98); }
    button.opt:disabled { opacity: .5; }
    button.opt.chosen { background: #1b5e20; border-color: #2e7d32; }
    input.numinput {
      font-size: 1.8rem; padding: 1.1rem; width: 100%; text-align: center;
      border: 2px solid #444; border-radius: 14px; background: #1c1c1f; color: #eee;
      margin-bottom: 1rem;
    }
    .status { font-size: 1.1rem; text-align: center; min-height: 1.5em; color: #9ad; }

    /* Identity gate */
    #gate { position: fixed; inset: 0; background: #111; display: flex; flex-direction: column;
      justify-content: center; gap: 1rem; padding: 2rem; }
    #gate h2 { margin: 0; font-size: 1.5rem; }
    #gate p { color: #999; margin: 0; }
    .me { font-size: .95rem; color: #777; }
  </style>
</head>
<body>
  <div id="gate">
    <h2>Join the poll</h2>
    <p>Pick a name for the leaderboard, or stay anonymous.</p>
    <input id="nameInput" class="numinput" placeholder="Your name" maxlength="20" style="text-align:left" />
    <button class="opt" id="joinNamed">Join</button>
    <button class="opt" id="joinAnon" style="opacity:.8">Go anonymous</button>
  </div>

  <h1 id="question">Loading…</h1>
  <div class="options" id="options"></div>
  <div class="status" id="status"></div>
  <div class="me" id="me"></div>

  <script type="module">
    import { ref, onValue, set, push, onDisconnect } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
    import { db, getParams } from "./firebase-config.js";
    import { POLLS } from "./polls.js";

    const { room } = getParams();
    const gate = document.getElementById("gate");
    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const statusEl = document.getElementById("status");
    const meEl = document.getElementById("me");

    // Safari Private Browsing / "Block All Cookies" makes localStorage throw on
    // write, which previously froze the join screen. Fall back to in-memory.
    const store = (() => {
      try {
        const k = "__probe";
        localStorage.setItem(k, "1");
        localStorage.removeItem(k);
        return localStorage;
      } catch {
        const mem = new Map();
        return {
          getItem: (k) => (mem.has(k) ? mem.get(k) : null),
          setItem: (k, v) => mem.set(k, String(v)),
          removeItem: (k) => mem.delete(k),
        };
      }
    })();

    let currentPoll = undefined;
    let player = getPlayer();

    if (player) startSession();
    else showGate();

    function getPlayer() {
      const id = store.getItem("playerId");
      const handle = store.getItem("handle");
      return id ? { id, handle } : null;
    }

    function showGate() {
      gate.style.display = "flex";
      document.getElementById("joinNamed").onclick = () => {
        const name = document.getElementById("nameInput").value.trim();
        join(name || randomHandle());
      };
      document.getElementById("joinAnon").onclick = () => join(randomHandle());
    }

    function join(handle) {
      const id = "p_" + Math.random().toString(36).slice(2, 10);
      store.setItem("playerId", id);
      store.setItem("handle", handle);
      player = { id, handle };
      gate.style.display = "none";
      startSession();
    }

    function randomHandle() {
      const colors = [
        "Crimson", "Scarlet", "Amber", "Gold", "Olive", "Emerald", "Teal",
        "Cyan", "Azure", "Cobalt", "Indigo", "Violet", "Magenta", "Rose",
        "Coral", "Salmon", "Maroon", "Bronze", "Copper", "Lime", "Mint",
        "Jade", "Turquoise", "Sapphire", "Lavender", "Plum", "Orchid",
        "Tangerine", "Saffron", "Slate",
      ];
      const color = colors[Math.floor(Math.random() * colors.length)];
      return `${color}${Math.floor(Math.random() * 90 + 10)}`;
    }

    function startSession() {
      meEl.textContent = `You: ${player.handle}`;

      // Presence: count this device while connected.
      const presenceList = ref(db, `rooms/${room}/presence`);
      onValue(ref(db, ".info/connected"), (snap) => {
        if (snap.val() !== true) return;
        const mine = push(presenceList);
        onDisconnect(mine).remove();
        set(mine, true);
      });

      onValue(ref(db, `rooms/${room}/currentPoll`), (snap) => {
        const poll = snap.val();
        if (poll === currentPoll) return;
        currentPoll = poll;
        render();
      }, (err) => {
        questionEl.textContent = "DB error: " + err.message;
        console.error(err);
      });
    }

    function render() {
      statusEl.textContent = "";
      optionsEl.innerHTML = "";
      const poll = POLLS[currentPoll];
      if (!currentPoll || !poll) {
        questionEl.textContent = "Waiting for the next question…";
        return;
      }
      questionEl.textContent = poll.question;
      const already = store.getItem(votedKey(currentPoll));
      if (poll.type === "number") renderNumber(poll, already);
      else renderChoice(poll, already);
    }

    function renderChoice(poll, already) {
      for (const opt of poll.options) {
        const btn = document.createElement("button");
        btn.className = "opt";
        btn.textContent = opt.label;
        if (already === opt.id) btn.classList.add("chosen");
        if (already) btn.disabled = true;
        btn.addEventListener("click", () => submit(opt.id));
        optionsEl.appendChild(btn);
      }
      if (already) statusEl.textContent = "✓ Your answer is in";
    }

    function renderNumber(poll, already) {
      if (already != null) {
        statusEl.textContent = `✓ You answered ${poll.unit || ""}${already}`;
        return;
      }
      const input = document.createElement("input");
      input.type = "number"; input.className = "numinput"; input.inputMode = "decimal";
      if (poll.min != null) input.min = poll.min;
      if (poll.max != null) input.max = poll.max;
      if (poll.step != null) input.step = poll.step;
      input.placeholder = poll.placeholder || "Your number";
      const btn = document.createElement("button");
      btn.className = "opt"; btn.textContent = "Submit";
      const go = () => {
        const val = parseFloat(input.value);
        if (!isFinite(val)) { statusEl.textContent = "Enter a number"; return; }
        if (poll.min != null && val < poll.min) { statusEl.textContent = `Must be ≥ ${poll.min}`; return; }
        if (poll.max != null && val > poll.max) { statusEl.textContent = `Must be ≤ ${poll.max}`; return; }
        submit(val);
      };
      btn.addEventListener("click", go);
      input.addEventListener("keydown", (e) => { if (e.key === "Enter") go(); });
      optionsEl.appendChild(input);
      optionsEl.appendChild(btn);
    }

    async function submit(answer) {
      const pollId = currentPoll;
      [...optionsEl.querySelectorAll("button, input")].forEach((el) => (el.disabled = true));
      try {
        await set(ref(db, `rooms/${room}/answers/${pollId}/${player.id}`), {
          h: player.handle,
          a: answer,
        });
        store.setItem(votedKey(pollId), String(answer));
        if (pollId === currentPoll) render();
      } catch (e) {
        statusEl.textContent = "Couldn't submit — try again";
        [...optionsEl.querySelectorAll("button, input")].forEach((el) => (el.disabled = false));
        console.error(e);
      }
    }

    const votedKey = (poll) => `voted:${room}:${poll}`;
  </script>
</body>
</html>
