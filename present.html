<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Present</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: #111;
      color: #eee;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 2rem;
      padding: 2rem;
    }
    .sidebar { display: flex; flex-direction: column; gap: 1rem; align-items: center; }
    #qr { background: #fff; padding: 12px; border-radius: 12px; }
    .join { font-size: .95rem; color: #9ad; text-align: center; word-break: break-all; }
    .controls { display: flex; gap: .75rem; flex-wrap: wrap; justify-content: center; }
    button {
      font-size: 1rem; padding: .7rem 1.1rem; border-radius: 10px;
      border: 1px solid #444; background: #1c1c1f; color: #eee; cursor: pointer;
    }
    button.reset { border-color: #7a2222; color: #ff9b9b; }
    .main { display: flex; flex-direction: column; gap: 1.5rem; }
    h1 { font-size: 2.4rem; margin: 0; }
    .chart { display: flex; flex-direction: column; gap: 1rem; }
    .row { display: flex; flex-direction: column; gap: .35rem; }
    .row .top { display: flex; justify-content: space-between; font-size: 1.3rem; }
    .bar-track { background: #1c1c1f; border-radius: 8px; overflow: hidden; height: 38px; }
    .bar-fill {
      height: 100%; background: linear-gradient(90deg, #2e7d32, #43a047);
      width: 0; transition: width .4s ease; border-radius: 8px;
    }
    .hint { color: #777; font-size: .9rem; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div id="qr"></div>
    <div class="join" id="joinUrl"></div>
    <div class="controls">
      <button id="prev">◀ Prev</button>
      <button id="next">Next ▶</button>
      <button id="reset" class="reset">Reset poll</button>
    </div>
    <div class="hint">→ / Space: next · ← : prev</div>
  </div>

  <div class="main">
    <h1 id="question">Loading…</h1>
    <div class="chart" id="chart"></div>
  </div>

  <!-- QR library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script type="module">
    import { ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
    import { db, getParams } from "./firebase-config.js";
    import { POLLS, POLL_ORDER } from "./polls.js";

    const { room } = getParams();
    const questionEl = document.getElementById("question");
    const chartEl = document.getElementById("chart");
    const joinUrlEl = document.getElementById("joinUrl");

    let currentPoll = null;
    let votesUnsub = null;

    // Render the join QR (vote URL with this room). Stays fixed for the session.
    const voteUrl = new URL("vote.html", location.href);
    voteUrl.searchParams.set("room", room);
    joinUrlEl.textContent = voteUrl.href;
    new QRCode(document.getElementById("qr"), {
      text: voteUrl.href, width: 240, height: 240,
    });

    // If no poll is set yet, default to the first one.
    onValue(ref(db, `rooms/${room}/currentPoll`), (snap) => {
      let poll = snap.val();
      if (!poll) { setPoll(POLL_ORDER[0]); return; }
      currentPoll = poll;
      showQuestion();
      subscribeVotes();
    }, (err) => {
      questionEl.textContent = "DB error: " + err.message;
      console.error(err);
    });

    function showQuestion() {
      const p = POLLS[currentPoll];
      questionEl.textContent = p ? p.question : "(unknown poll)";
    }

    function subscribeVotes() {
      if (votesUnsub) votesUnsub();
      votesUnsub = onValue(ref(db, `rooms/${room}/votes/${currentPoll}`), (snap) => {
        renderChart(snap.val() || {});
      });
    }

    function renderChart(votes) {
      const p = POLLS[currentPoll];
      if (!p) { chartEl.innerHTML = ""; return; }
      const total = p.options.reduce((s, o) => s + (votes[o.id] || 0), 0);
      chartEl.innerHTML = "";
      for (const o of p.options) {
        const count = votes[o.id] || 0;
        const pct = total ? Math.round((count / total) * 100) : 0;
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <div class="top"><span>${o.label}</span><span>${count} (${pct}%)</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>`;
        chartEl.appendChild(row);
      }
    }

    function setPoll(poll) {
      set(ref(db, `rooms/${room}/currentPoll`), poll);
    }

    function advance(dir) {
      const i = POLL_ORDER.indexOf(currentPoll);
      const next = POLL_ORDER[i + dir];
      if (next) setPoll(next);
    }

    document.getElementById("next").onclick = () => advance(1);
    document.getElementById("prev").onclick = () => advance(-1);
    document.getElementById("reset").onclick = () => {
      if (confirm(`Clear all votes for "${currentPoll}"?`)) {
        remove(ref(db, `rooms/${room}/votes/${currentPoll}`));
      }
    };

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); advance(1); }
      if (e.key === "ArrowLeft") advance(-1);
    });
  </script>
</body>
</html>
