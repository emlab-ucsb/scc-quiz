<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trivia Night</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: system-ui, sans-serif; background: #fbfaf7; color: #1b1b1f;
      overflow: hidden;
    }
    .slide {
      position: absolute; inset: 0; display: none; flex-direction: column;
      justify-content: center; padding: 5vh 8vw; gap: 1rem;
    }
    .slide.active { display: flex; }
    h1 { font-size: 3.4rem; margin: 0; line-height: 1.1; }
    h2 { font-size: 2.3rem; margin: 0 0 1rem; line-height: 1.15; }
    p, li { font-size: 1.6rem; line-height: 1.5; }
    ul { margin: 0; padding-left: 0; list-style: none; }
    ul li { margin: .5rem 0; }
    .muted { color: #6b7280; font-size: 1.1rem; }
    .accent { color: #1b7f33; }

    /* Question slides get a per-question backdrop (set via --bg); others blank. */
    .qslide::before {
      content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background: var(--bg) center/contain no-repeat;
      opacity: .45;
    }
    .qslide > * { position: relative; z-index: 1; }
    /* Anchor question content to the top margin so it doesn't jump slide-to-slide */
    .slide.qslide { justify-content: flex-start; }

    /* Question label */
    .qtopic { font-size: 1.3rem; font-weight: 700; color: #1d4ed8; letter-spacing: .04em; }

    /* Centered intro / how-to slide */
    .divider { align-items: center; justify-content: center; text-align: center; }
    .divider .big-icon { font-size: 7rem; line-height: 1; }
    .divider h1 { font-size: 4rem; }

    /* Two-column results layout: options left, chart right */
    .poll-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; }
    .opt-line { display: flex; align-items: baseline; gap: .6rem; }
    .opt-line .key { color: #1d4ed8; font-weight: 700; min-width: 1.4em; }
    .opt-line.correct { color: #1b7f33; font-weight: 600; }
    .opt-line.correct .key { color: #1b7f33; }
    .opt-line .check { color: #1b7f33; font-weight: 700; }
    /* Per-option note (e.g. a temperature) revealed only on the answer slide */
    .opt-note { color: #b45309; font-weight: 700; margin-left: .4rem;
      animation: notePop .35s ease both; }
    @keyframes notePop {
      from { opacity: 0; transform: translateY(5px) scale(.9); }
      to   { opacity: 1; transform: none; }
    }

    .chart-cols { display: flex; align-items: stretch; gap: .8rem; height: 44vh; }
    .bar-col { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: .4rem; }
    .bar-count { font-size: 1.1rem; color: #555; white-space: nowrap; }
    .bar-track { flex: 1; width: 70%; display: flex; align-items: flex-end; }
    .bar-fill { width: 100%; height: 0; border-radius: 8px 8px 0 0;
      background: linear-gradient(180deg, #4caf50, #2e7d32); transition: height .4s ease; }
    .bar-fill.correct { background: linear-gradient(180deg, #ffca28, #c9a227); }
    .bar-label { font-size: 1.3rem; font-weight: 700; }
    .bar-label.correct { color: #b8860b; }
    .poll-empty { color: #999; font-size: 1.3rem; }

    /* Live answer tally on the ask slide */
    .tally { font-size: 2.2rem; font-weight: 800; color: #1b7f33; margin-top: 1rem; }
    .tally-hint { color: #9aa0a6; font-size: 1rem; }

    /* Title slide: right-aligned text left of a large, centered QR code */
    .title-slide { flex-direction: row; align-items: center; justify-content: center; gap: 4vw; }
    .title-text { text-align: right; line-height: 1.3; }
    .title-text .t-title { font-size: 3rem; font-weight: 800; color: #1b1b1f; margin-bottom: 1.2rem; }
    .title-text .t-sub { font-size: 1.7rem; color: #444; }
    .qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 1.4vh; }
    .qr { background: #fff; padding: 1.5vh; border-radius: 16px; line-height: 0;
      box-shadow: 0 2px 16px rgba(0,0,0,.15); }
    .qr img, .qr canvas { width: 72vh; height: 72vh; }
    .qr img { display: block; }
    /* Minimal live counter under the QR */
    .join-count { display: flex; align-items: center; gap: .55rem;
      font-size: 1.25rem; color: #6b7280; }
    .join-count::before { content: ""; width: .62rem; height: .62rem; border-radius: 50%;
      background: #1b7f33; animation: livePulse 2s ease-in-out infinite; }
    @keyframes livePulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }

    /* Podium */
    .podium { display: flex; gap: 2rem; align-items: flex-end; justify-content: center; height: 50vh; }
    .stand { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: .6rem; width: 18vw; }
    .stand .name { font-size: 1.6rem; font-weight: 700; }
    .stand .score { color: #1d4ed8; font-size: 1.2rem; }
    .stand .block { width: 100%; border-radius: 12px 12px 0 0; display: flex; align-items: flex-start;
      justify-content: center; font-size: 3rem; padding-top: .5rem; }
    .gold .block   { background: linear-gradient(180deg,#ffd54f,#c9a227); height: 38vh; }
    .silver .block { background: linear-gradient(180deg,#cfd8dc,#90a4ae); height: 28vh; }
    .bronze .block { background: linear-gradient(180deg,#d7a06a,#a86a3d); height: 20vh; }

    .pagenum { position: fixed; bottom: 1rem; right: 1.2rem; color: #aaa; font-size: .9rem; }
  </style>
</head>
<body>
  <!-- Join -->
  <section class="slide title-slide" data-join>
    <div class="title-text">
      <div class="t-title">Tuesday Team Time Trivia (TTTT)</div>
      <div class="t-sub">June 23, 2026</div>
      <div class="t-sub">Jordan Wingenroth</div>
    </div>
    <div class="qr-wrap">
      <div class="qr"></div>
      <div class="join-count" id="joinCount">0 connected</div>
    </div>
  </section>

  <!-- How to play -->
  <section class="slide divider">
    <div class="big-icon">📋</div>
    <h1>How to play</h1>
    <p>Pick a name or go anonymous. Answer on your phone before we reveal.</p>
    <p class="accent">+1 point for every correct answer. Most points wins.</p>
  </section>

  <!-- Question slides are generated here -->

  <!-- Podium -->
  <section class="slide" data-podium>
    <h2>🏆 Final leaderboard</h2>
    <div class="podium"><div class="poll-empty">Tallying…</div></div>
  </section>

  <div class="pagenum"></div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script type="module">
    import { ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
    import { db } from "./firebase-config.js";
    // Load the question bank fresh on every visit (the ?v= busts the browser
    // cache) so edits to polls.js show up on a normal reload — no hard refresh.
    const { POLLS, POLL_ORDER, scoreAnswer } = await import(`./polls.js?v=${Date.now()}`);

    // Room comes from the URL (?room=foo) so each test can use a fresh room;
    // defaults to TTT for the real event. The QR below points phones at it.
    const ROOM = new URLSearchParams(location.search).get("room") || "TTT";
    const PLACEHOLDER_BG = "pics/Candy-Cane-Pistol-Shrimp.png.webp";
    const letter = (i) => String.fromCharCode(65 + i);

    // ---- build question slides before the podium ----
    // Each question becomes two slides: an "ask" slide (options + live tally,
    // no breakdown) and a "results" slide (column graph, correct highlighted).
    (function buildSlides() {
      const podium = document.querySelector("[data-podium]");
      const optList = (poll, mark) => poll.options.map((o, i) => {
        const isCorrect = mark && poll.correct === o.id;
        const note = mark && o.note ? `<span class="opt-note">${o.note}</span>` : "";
        return `<li class="opt-line${isCorrect ? " correct" : ""}">` +
          `<span class="key">${letter(i)}.</span><span class="text">${o.label}</span>${note}` +
          `<span class="check">${isCorrect ? "✓" : ""}</span></li>`;
      }).join("");

      POLL_ORDER.forEach((id, n) => {
        const poll = POLLS[id];
        const bg = `url("${poll.background || PLACEHOLDER_BG}")`;
        const head =
          `<div class="qtopic">Question ${n + 1} / ${POLL_ORDER.length}</div>` +
          `<h2>${poll.question}</h2>`;

        const ask = document.createElement("section");
        ask.className = "slide qslide";
        ask.dataset.poll = id;
        ask.dataset.mode = "ask";
        ask.style.setProperty("--bg", bg);
        ask.innerHTML = head +
          `<ul>${optList(poll, false)}</ul>` +
          `<div class="tally">⏳ 0 answers in</div>` +
          `<div class="tally-hint">→ to reveal the answer</div>`;
        podium.before(ask);

        const results = document.createElement("section");
        results.className = "slide qslide";
        results.dataset.poll = id;
        results.dataset.mode = "results";
        results.style.setProperty("--bg", bg);
        results.innerHTML = head +
          `<div class="poll-grid"><ul>${optList(poll, true)}</ul>` +
          `<div class="poll-chart"><div class="poll-empty">No answers yet…</div></div></div>`;
        podium.before(results);
      });
    })();

    // Keep the "N questions" labels in sync with the bank.
    document.querySelectorAll(".qcount").forEach((e) => (e.textContent = POLL_ORDER.length));

    const slides = [...document.querySelectorAll(".slide")];
    const pagenum = document.querySelector(".pagenum");
    let idx = 0;
    let pollUnsub = null;
    let cur = null; // { slide, poll, mode, answers }

    function show(i) {
      idx = Math.max(0, Math.min(slides.length - 1, i));
      slides.forEach((s, n) => s.classList.toggle("active", n === idx));
      pagenum.textContent = `${idx + 1} / ${slides.length}`;
      onEnter(slides[idx]);
    }

    function onEnter(slide) {
      if (pollUnsub) { pollUnsub(); pollUnsub = null; }
      cur = null;
      const pollId = slide.dataset.poll;
      const mode = slide.dataset.mode;
      if (pollId && POLLS[pollId]) {
        // Open voting only while asking; the results slide closes it.
        set(ref(db, `rooms/${ROOM}/currentPoll`), mode === "ask" ? pollId : null);
        cur = { slide, poll: POLLS[pollId], mode, answers: {} };
        pollUnsub = onValue(ref(db, `rooms/${ROOM}/answers/${pollId}`), (snap) => {
          cur.answers = snap.val() || {};
          paint();
        });
      } else {
        set(ref(db, `rooms/${ROOM}/currentPoll`), null); // phones wait
        if (slide.dataset.podium !== undefined) renderPodium(slide.querySelector(".podium"));
      }
    }

    function paint() {
      if (!cur) return;
      const total = Object.keys(cur.answers).length;
      if (cur.mode === "ask") {
        cur.slide.querySelector(".tally").textContent =
          `⏳ ${total} answer${total === 1 ? "" : "s"} in`;
      } else {
        renderResults();
      }
    }

    // ---- results column graph (bar height = number of answers) ----
    function renderResults() {
      const { slide, poll, answers } = cur;
      const chart = slide.querySelector(".poll-chart");
      const counts = {};
      for (const r of Object.values(answers)) counts[r.a] = (counts[r.a] || 0) + 1;
      const total = Object.keys(answers).length;
      const max = Math.max(1, ...poll.options.map((o) => counts[o.id] || 0));

      chart.innerHTML = "";
      if (!total) { chart.innerHTML = `<div class="poll-empty">No answers in.</div>`; return; }
      const el = document.createElement("div");
      el.className = "chart-cols";
      poll.options.forEach((o, i) => {
        const c = counts[o.id] || 0;
        const isCorrect = poll.correct === o.id;
        const col = document.createElement("div");
        col.className = "bar-col";
        col.innerHTML =
          `<div class="bar-count">${c}</div>` +
          `<div class="bar-track"><div class="bar-fill${isCorrect ? " correct" : ""}" style="height:${Math.round((c / max) * 100)}%"></div></div>` +
          `<div class="bar-label${isCorrect ? " correct" : ""}">${letter(i)}${isCorrect ? " ✓" : ""}</div>`;
        el.appendChild(col);
      });
      chart.appendChild(el);
    }

    // ---- podium ----
    async function renderPodium(container) {
      const snap = await get(ref(db, `rooms/${ROOM}/answers`));
      const data = snap.val() || {};
      const scores = {};
      for (const pollId in data) {
        const poll = POLLS[pollId];
        for (const pid in data[pollId]) {
          const { h, a } = data[pollId][pid];
          if (!scores[pid]) scores[pid] = { handle: h || "anon", score: 0 };
          scores[pid].handle = h || scores[pid].handle;
          scores[pid].score += scoreAnswer(poll, a);
        }
      }
      const ranked = Object.values(scores).filter((s) => s.score > 0).sort((a, b) => b.score - a.score);
      container.innerHTML = "";
      if (!ranked.length) { container.innerHTML = `<div class="poll-empty">No correct answers yet.</div>`; return; }
      const medals = ["🥇", "🥈", "🥉"];
      const cls = ["gold", "silver", "bronze"];
      const order = [1, 0, 2]; // silver, gold, bronze for visual centering
      for (const r of order) {
        if (!ranked[r]) continue;
        const s = ranked[r];
        const stand = document.createElement("div");
        stand.className = `stand ${cls[r]}`;
        stand.innerHTML =
          `<div class="name">${s.handle}</div>` +
          `<div class="score">${s.score} correct</div>` +
          `<div class="block">${medals[r]}</div>`;
        container.appendChild(stand);
      }
    }

    // ---- title slide QR ----
    (function initJoin() {
      const slide = document.querySelector("[data-join]");
      const voteUrl = new URL("vote.html", location.href);
      voteUrl.searchParams.set("room", ROOM);
      // Render at high resolution; CSS scales it down to ~72vh so it stays crisp.
      new QRCode(slide.querySelector(".qr"), { text: voteUrl.href, width: 1000, height: 1000 });
      const countEl = slide.querySelector("#joinCount");
      onValue(ref(db, `rooms/${ROOM}/presence`), (snap) => {
        const k = snap.size || 0;
        countEl.textContent = `${k} connected`;
      });
    })();

    // ---- navigation ----
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); show(idx + 1); }
      if (e.key === "ArrowLeft") show(idx - 1);
    });
    show(0);
  </script>
</body>
</html>
